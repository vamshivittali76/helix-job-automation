# ============================================================
# HELIX — API Keys & Secrets
# SETUP: Copy this file to secrets.yaml and fill in your keys.
#   cp config/secrets.template.yaml config/secrets.yaml
#
# WARNING: secrets.yaml is gitignored. NEVER commit it.
# ============================================================

# --- LLM (Helix default: free local Ollama; OpenAI is optional) ---
# Install Ollama: https://ollama.ai — then: ollama pull llama3.2
# llm_provider: auto   → try Ollama first, then OpenAI if configured
# llm_provider: ollama → local only (no cloud)
# llm_provider: openai → cloud only (requires key below)
llm_provider: auto
ollama_base_url: "http://127.0.0.1:11434"
ollama_model: "llama3.2"

# Optional: OpenAI API key (paid). Only used if llm_provider is openai, or auto when Ollama is unavailable.
# https://platform.openai.com/api-keys
openai_api_key: ""

# Adzuna Job API (free signup — ~1000 results/month free tier)
# Get yours at: https://developer.adzuna.com/
adzuna:
  app_id: "your-adzuna-app-id"
  app_key: "your-adzuna-app-key"

# Jooble Job API (free signup)
# Request key at: https://jooble.org/api/about
jooble:
  api_key: "your-jooble-api-key"

# SerpAPI (powers Google Jobs scraping — free tier: 100 searches/month)
# Get yours at: https://serpapi.com/
serpapi_key: "your-serpapi-key"

# Gmail OAuth credentials (optional — enables email status monitoring)
# Steps:
#   1. Go to https://console.cloud.google.com/
#   2. Create a project, enable Gmail API
#   3. Create OAuth 2.0 credentials (Desktop app)
#   4. Download JSON → save as config/credentials.json
#   5. Run: python -m src.cli monitor --setup
# Leave as empty string if not using email monitoring.
gmail_credentials_path: "config/credentials.json"

# Discord Bot Token (optional — enables the Helix Discord bot interface)
# Steps:
#   1. Go to https://discord.com/developers/applications
#   2. Create New Application → name it "Helix"
#   3. Bot tab → Reset Token → Copy token
#   4. Under OAuth2, grant: bot + applications.commands scopes
#   5. Bot permissions: Send Messages, Embed Links, Attach Files, Read Message History
# Leave as empty string if using CLI only.
discord_bot_token: "your-discord-bot-token"

# Helix Coach — optional dedicated text channel for natural language:
# paste job URLs (viability, fit, resume tips), cover letters, LinkedIn outreach, resume Q&A.
# Create a channel named exactly `#helix-coach` and the bot will auto-detect it on startup.
# Set `helix_coach_channel_id` to a numeric ID only if you need a different channel name.
# Set to 0 or omit to rely on auto-detect (or disable if no #helix-coach exists).
helix_coach_channel_id: 0
